version: 1
applications:
  - appRoot: apps/frontend
    frontend:
      phases:
        preBuild:
          commands:
            # Install Flutter SDK
            - git clone https://github.com/flutter/flutter.git -b stable --depth 1
            - export PATH="$PATH:$(pwd)/flutter/bin"
            - flutter config --no-analytics
            - flutter config --enable-web
            - flutter pub get
            - |
              cat <<EOF > .env
              API_BASE_URL=${API_BASE_URL:-http://localhost:8000}
              ANDROID_PACKAGE_NAME=${ANDROID_PACKAGE_NAME:-com.shashigemini.cs698repo}
              ANDROID_CERT_HASH=${ANDROID_CERT_HASH:-DUMMY_HASH}
              IOS_BUNDLE_ID=${IOS_BUNDLE_ID:-com.shashigemini.cs698repo}
              IOS_TEAM_ID=${IOS_TEAM_ID:-DUMMY_TEAM_ID}
              SECURITY_WATCHER_MAIL=${SECURITY_WATCHER_MAIL:-security@spiritualqa.com}
              SSL_CERT_FINGERPRINT=${SSL_CERT_FINGERPRINT:-DUMMY_FINGERPRINT}
              USE_SSL_PINNING=${USE_SSL_PINNING:-false}
              EOF
            - flutter create . --platforms web
            - dart run build_runner build --delete-conflicting-outputs
        build:
          commands:
            - flutter build web --release
      artifacts:
        # Relative to repository root
        baseDirectory: build/web
        files:
          - '**/*'
      cache:
        paths:
          - apps/frontend/.pub-cache/**/*
          - flutter/**/*
