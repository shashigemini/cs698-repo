services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-spiritual_qa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /cs698/production
        tag: "{{.Name}}"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /cs698/production
        tag: "{{.Name}}"

  qdrant:
    image: qdrant/qdrant:v1.9.2
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    # Removed healthcheck due to missing curl in base image and corruption issues
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /cs698/production
        tag: "{{.Name}}"

  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-spiritual_qa}
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CSRF_SECRET: ${CSRF_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    depends_on:
      - postgres
      - redis
      - qdrant
    ports:
      - "8000:8000"
    volumes:
      - pdf_storage:/app/data/pdfs
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /cs698/production
        tag: "{{.Name}}"

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  pdf_storage:
