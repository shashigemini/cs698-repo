services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-spiritual_qa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /cs698/production
        awslogs-stream-prefix: postgres
        awslogs-create-group: "true"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /cs698/production
        awslogs-stream-prefix: redis
        awslogs-create-group: "true"

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /cs698/production
        awslogs-stream-prefix: qdrant
        awslogs-create-group: "true"

  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-spiritual_qa}
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CSRF_SECRET: ${CSRF_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - pdf_storage:/app/data/pdfs
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /cs698/production
        awslogs-stream-prefix: backend
        awslogs-create-group: "true"

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  pdf_storage:
