name: Deploy to GitHub Pages

on:
  push:
    branches:
      - frontend_development
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  verify-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Debug - List contents
        run: ls -R

      - name: Prepare .env
        run: |
          if [ -f .env.web ]; then
            cp .env.web .env
          else
            echo "API_BASE_URL=https://mock.api.spiritualqa.com" > .env
            echo "ANDROID_PACKAGE_NAME=com.shashigemini.cs698repo" >> .env
            echo "ANDROID_CERT_HASH=DUMMY_HASH" >> .env
            echo "IOS_BUNDLE_ID=com.shashigemini.cs698repo" >> .env
            echo "IOS_TEAM_ID=DUMMY_TEAM_ID" >> .env
            echo "SECURITY_WATCHER_MAIL=security@spiritualqa.com" >> .env
            echo "SSL_CERT_FINGERPRINT=DUMMY_FINGERPRINT" >> .env
            echo "USE_SSL_PINNING=false" >> .env
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run frontend tests
        run: flutter test --coverage

      - name: Build Web
        run: flutter build web --target lib/main.dart --base-href "/cs698-repo/" --release

      - name: Upload verified web artifact
        uses: actions/upload-artifact@v4
        with:
          name: verified-frontend-web
          path: frontend/build/web

  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: verify-build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - name: Download verified web artifact
        uses: actions/download-artifact@v4
        with:
          name: verified-frontend-web
          path: frontend/build/web

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAGES_TOKEN }}
          publish_dir: ./frontend/build/web
