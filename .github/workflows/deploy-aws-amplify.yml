name: deploy-aws-amplify

on:
  workflow_run:
    workflows: ["run-frontend-tests"]
    types: [completed]

jobs:
  deploy-frontend-production:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Amplify production deployment webhook
        env:
          AMPLIFY_WEBHOOK_URL: ${{ secrets.AMPLIFY_PROD_WEBHOOK_URL }}
        run: |
          test -n "$AMPLIFY_WEBHOOK_URL"
          curl -fsS -X POST "$AMPLIFY_WEBHOOK_URL"

  deploy-frontend-staging:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch != 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Amplify staging deployment webhook
        env:
          AMPLIFY_WEBHOOK_URL: ${{ secrets.AMPLIFY_STAGING_WEBHOOK_URL }}
        run: |
          test -n "$AMPLIFY_WEBHOOK_URL"
          curl -fsS -X POST "$AMPLIFY_WEBHOOK_URL"
