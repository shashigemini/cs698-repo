name: run-integration-tests

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - "apps/frontend/**"
      - ".github/workflows/run-integration-tests.yml"
  workflow_dispatch:
    inputs:
      target_url:
        description: "Optional deployed backend URL (example: https://api.example.com)"
        required: false
        type: string

jobs:
  local-fullstack-integration:
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_url == '') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('apps/frontend/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-dev libblkid-dev liblzma-dev ninja-build libsecret-1-dev
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
      - name: Setup frontend dependencies
        working-directory: apps/frontend
        run: |
          flutter pub get
          cat <<EOF > .env
          API_BASE_URL=http://localhost:8000
          ANDROID_PACKAGE_NAME=com.example.frontend
          ANDROID_CERT_HASH=DUMMY
          IOS_BUNDLE_ID=com.example.frontend
          IOS_TEAM_ID=DUMMY
          SECURITY_WATCHER_MAIL=security@example.org
          SSL_CERT_FINGERPRINT=DUMMY
          USE_SSL_PINNING=false
          EOF
      - name: Run full-stack integration path
        env:
          E2E_BASE_URL: http://localhost:8000
        run: bash apps/frontend/tool/run_e2e.sh

  cloud-target-validation:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_url != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('apps/frontend/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-dev libblkid-dev liblzma-dev ninja-build libsecret-1-dev
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
      - name: Setup frontend dependencies
        working-directory: apps/frontend
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
        run: |
          flutter pub get
          cat <<EOF > .env
          API_BASE_URL=${TARGET_URL}
          ANDROID_PACKAGE_NAME=com.example.frontend
          ANDROID_CERT_HASH=DUMMY
          IOS_BUNDLE_ID=com.example.frontend
          IOS_TEAM_ID=DUMMY
          SECURITY_WATCHER_MAIL=security@example.org
          SSL_CERT_FINGERPRINT=DUMMY
          USE_SSL_PINNING=false
          EOF
          dart run build_runner build --delete-conflicting-outputs
      - name: Execute cloud-targeted E2E tests
        working-directory: apps/frontend
        run: dart run tool/run_integration_tests.dart integration_test/e2e
        env:
          E2E_BASE_URL: ${{ github.event.inputs.target_url }}
