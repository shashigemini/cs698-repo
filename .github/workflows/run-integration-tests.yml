name: run-integration-tests

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/run-integration-tests.yml"
  workflow_dispatch:
    inputs:
      target_url:
        description: "Optional deployed backend URL (example: https://api.example.com)"
        required: false
        type: string

jobs:
  local-fullstack-integration:
    if: ${{ github.event_name == 'pull_request' || github.event.inputs.target_url == '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Setup frontend dependencies
        working-directory: frontend
        run: |
          flutter pub get
          cat <<EOF > .env
          API_BASE_URL=http://localhost:8000
          ANDROID_PACKAGE_NAME=com.example.frontend
          ANDROID_CERT_HASH=DUMMY
          IOS_BUNDLE_ID=com.example.frontend
          IOS_TEAM_ID=DUMMY
          SECURITY_WATCHER_MAIL=security@example.org
          SSL_CERT_FINGERPRINT=DUMMY
          USE_SSL_PINNING=false
          EOF
      - name: Run full-stack integration path
        env:
          E2E_BASE_URL: http://localhost:8000
        run: bash frontend/tool/run_e2e.sh

  cloud-target-validation:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_url != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Setup frontend dependencies
        working-directory: frontend
        run: flutter pub get
      - name: Execute cloud-targeted E2E tests
        working-directory: frontend
        run: dart run tool/run_integration_tests.dart integration_test/e2e
        env:
          E2E_BASE_URL: ${{ github.event.inputs.target_url }}
