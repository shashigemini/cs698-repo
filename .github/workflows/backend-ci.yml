name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install --with dev --no-interaction
      - name: Ruff lint
        run: poetry run ruff check .
      - name: Ruff format check
        run: poetry run ruff format --check .

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Start test services
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          until docker compose -f docker-compose.test.yml exec -T postgres pg_isready -U postgres; do
            sleep 2
          done
          echo "Waiting for Redis..."
          until docker compose -f docker-compose.test.yml exec -T redis redis-cli ping; do
            sleep 2
          done
          echo "Waiting for Qdrant..."
          until curl -sf http://localhost:6333/healthz; do
            sleep 2
          done
          echo "All services ready."

      - name: Run tests with coverage
        run: poetry run pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=85 -v
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/spiritual_qa
          REDIS_URL: redis://localhost:6379/0
          QDRANT_HOST: localhost

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

      - name: Stop test services
        if: always()
        run: docker compose -f docker-compose.test.yml down
