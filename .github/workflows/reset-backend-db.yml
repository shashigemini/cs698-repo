name: reset-backend-db

on:
  workflow_dispatch:

jobs:
  reset-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get EC2 IP from Terraform state
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=cs698/terraform.tfstate" \
            -backend-config="region=${{ secrets.TF_STATE_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true" \
            -input=false -reconfigure
          echo "PUBLIC_IP=$(terraform output -raw public_ip)" >> "$GITHUB_ENV"

      - name: Configure SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/ec2_deploy_key
          printf '%s' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/ec2_deploy_key

      - name: Wipe postgres volume and restart
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_deploy_key ubuntu@"$PUBLIC_IP" <<'EOF'
            set -ex
            COMPOSE="-f /home/ubuntu/cs698-repo/infra/production/docker-compose.prod.yml"
            sudo docker compose $COMPOSE stop backend
            sudo docker compose $COMPOSE rm -f db
            sudo docker volume ls | grep postgres | awk '{print $2}' | xargs -r sudo docker volume rm
            sudo docker compose --env-file /home/ubuntu/cs698-repo/apps/backend/.env $COMPOSE up -d
            echo "DB reset complete"
          EOF
