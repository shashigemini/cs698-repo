name: deploy-aws-ec2

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "infra/**"
      - ".github/workflows/deploy-aws-ec2.yml"
  workflow_dispatch:

jobs:
  deploy-containerized-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init
        run: |
          TF_STATE_BUCKET="${{ secrets.TF_STATE_BUCKET }}"
          TF_STATE_KEY="${{ secrets.TF_STATE_KEY }}"
          TF_STATE_REGION="${{ secrets.TF_STATE_REGION }}"

          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "Missing required secret: TF_STATE_BUCKET"
            exit 1
          fi

          if [ -z "$TF_STATE_KEY" ]; then
            TF_STATE_KEY="cs698/terraform.tfstate"
          fi

          if [ -z "$TF_STATE_REGION" ]; then
            TF_STATE_REGION="us-east-1"
          fi

          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"
      - name: Terraform validate
        run: terraform validate
      - name: Terraform apply
        run: |
          terraform apply -auto-approve \
            -var "openai_api_key=${{ secrets.OPENAI_API_KEY }}" \
            -var "csrf_secret=${{ secrets.CSRF_SECRET }}" \
            -var "jwt_private_key=${{ secrets.JWT_PRIVATE_KEY }}" \
            -var "jwt_public_key=${{ secrets.JWT_PUBLIC_KEY }}" \
            -var "ec2_key_name=${{ secrets.EC2_KEY_NAME }}" \
            -var "repo_clone_url=https://github.com/${{ github.repository }}.git"
      - name: Configure SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/ec2_deploy_key
          printf '%s' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/ec2_deploy_key
      - name: Wait for EC2 SSH readiness
        run: |
          PUBLIC_IP="$(terraform output -raw public_ip)"
          for attempt in {1..30}; do
            if ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no -i ~/.ssh/ec2_deploy_key ubuntu@"$PUBLIC_IP" "echo 'SSH is ready'" >/dev/null 2>&1; then
              echo "SSH ready on attempt ${attempt}"
              exit 0
            fi
            echo "Waiting for SSH to become available (attempt ${attempt}/30)..."
            sleep 10
          done
          echo "SSH did not become available in time."
          exit 1
      - name: Deploy/update backend container stack
        run: |
          PUBLIC_IP="$(terraform output -raw public_ip)"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_deploy_key ubuntu@"$PUBLIC_IP" \
            "cd /home/ubuntu/cs698-repo && sudo docker compose --env-file /home/ubuntu/cs698-repo/apps/backend/.env -f infra/production/docker-compose.prod.yml pull && sudo docker compose --env-file /home/ubuntu/cs698-repo/apps/backend/.env -f infra/production/docker-compose.prod.yml up -d --build"
      - name: Post-deploy readiness check
        run: |
          BACKEND_URL="http://$(terraform output -raw public_ip):8000"
          curl -fsS "$BACKEND_URL/health/full"
