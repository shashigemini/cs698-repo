name: deploy-aws-ec2

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "infra/**"
      - ".github/workflows/deploy-aws-ec2.yml"
  workflow_dispatch:

jobs:
  deploy-containerized-backend:
    runs-on: ubuntu-latest
    env:
      HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
      TF_STATE_KEY: cs698/terraform.tfstate
      TF_PLAN_FILE: tfplan.binary
      TF_PLAN_TEXT: tfplan.txt
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Validate Terraform backend configuration
        run: |
          TF_STATE_BUCKET="${{ secrets.TF_STATE_BUCKET }}"
          TF_STATE_REGION="${{ secrets.TF_STATE_REGION }}"
          TF_STATE_KEY_SECRET="${{ secrets.TF_STATE_KEY }}"

          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "Missing required secret: TF_STATE_BUCKET"
            exit 1
          fi

          if [ -z "$TF_STATE_REGION" ]; then
            echo "Missing required secret: TF_STATE_REGION"
            exit 1
          fi

          if [ -z "$TF_STATE_KEY" ]; then
            echo "TF_STATE_KEY must not be empty"
            exit 1
          fi

          EXPECTED_TF_STATE_KEY="cs698/terraform.tfstate"
          if [ "$TF_STATE_KEY" != "$EXPECTED_TF_STATE_KEY" ]; then
            echo "TF_STATE_KEY changed unexpectedly: '$TF_STATE_KEY' (expected '$EXPECTED_TF_STATE_KEY')"
            exit 1
          fi

          if [ -n "$TF_STATE_KEY_SECRET" ] && [ "$TF_STATE_KEY_SECRET" != "$TF_STATE_KEY" ]; then
            echo "Secret TF_STATE_KEY conflicts with enforced workflow key ('$TF_STATE_KEY')."
            echo "Remove or align TF_STATE_KEY secret to prevent inconsistent backend usage across environments."
            exit 1
          fi

      - name: Print effective Terraform backend settings
        run: |
          echo "Terraform backend configuration (effective):"
          echo "  bucket=${{ secrets.TF_STATE_BUCKET }}"
          echo "  key=${TF_STATE_KEY}"
          echo "  region=${{ secrets.TF_STATE_REGION }}"

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${{ secrets.TF_STATE_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: terraform_plan
        env:
          TF_STACK_ID: ${{ vars.TF_STACK_ID || secrets.TF_STACK_ID }}
          TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          TF_VAR_csrf_secret: ${{ secrets.CSRF_SECRET }}
          TF_VAR_jwt_private_key: ${{ secrets.JWT_PRIVATE_KEY }}
          TF_VAR_jwt_public_key: ${{ secrets.JWT_PUBLIC_KEY }}
          TF_VAR_ec2_key_name: ${{ secrets.EC2_KEY_NAME }}
          TF_VAR_github_token: ${{ secrets.GH_PAT_AMPLIFY }}
          TF_VAR_frontend_origin: ${{ vars.FRONTEND_ORIGIN }}
          TF_VAR_api_base_url: ${{ vars.API_BASE_URL }}
        run: |
          if [ -z "$TF_STACK_ID" ]; then
            echo "Missing required repository variable/secret: TF_STACK_ID"
            exit 1
          fi

          set +e
          terraform plan -detailed-exitcode -no-color \
            -out="${TF_PLAN_FILE}" \
            -var "repo_clone_url=https://github.com/${{ github.repository }}.git" \
            -var "environment=prod" \
            -var "stack_id=${TF_STACK_ID}"
          PLAN_EXIT_CODE=$?
          set -e

          if [ "$PLAN_EXIT_CODE" -eq 1 ]; then
            echo "terraform plan failed"
            exit 1
          fi

          terraform show -no-color "${TF_PLAN_FILE}" > "${TF_PLAN_TEXT}"

          echo "Terraform plan summary:"
          if ! grep -E "^Plan:" "${TF_PLAN_TEXT}"; then
            echo "No explicit Plan line found; showing final 20 lines for auditability:"
            tail -n 20 "${TF_PLAN_TEXT}"
          fi

          if [ "$PLAN_EXIT_CODE" -eq 0 ]; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "Terraform plan exit code 0: no changes."
          elif [ "$PLAN_EXIT_CODE" -eq 2 ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "Terraform plan exit code 2: changes detected."
          else
            echo "Unexpected terraform plan exit code: $PLAN_EXIT_CODE"
            exit 1
          fi

      - name: Terraform apply
        if: steps.terraform_plan.outputs.changes == 'true'
        run: |
          terraform apply -auto-approve "${TF_PLAN_FILE}"

      - name: Capture Terraform outputs
        run: |
          echo "PUBLIC_IP=$(terraform output -raw public_ip)" >> "$GITHUB_ENV"
          echo "BACKEND_URL=$(terraform output -raw backend_url)" >> "$GITHUB_ENV"

      - name: Configure SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/ec2_deploy_key
          printf '%s' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/ec2_deploy_key

      - name: Wait for EC2 SSH readiness
        run: |
          for attempt in {1..30}; do
            if ssh -o ConnectTimeout=5 -o BatchMode=yes -o StrictHostKeyChecking=no -i ~/.ssh/ec2_deploy_key ubuntu@"$PUBLIC_IP" "echo 'SSH is ready'" >/dev/null 2>&1; then
              echo "SSH ready on attempt ${attempt}"
              exit 0
            fi
            echo "Waiting for SSH to become available (attempt ${attempt}/30) at ${PUBLIC_IP}..."
            sleep 10
          done
          echo "SSH did not become available in time."
          exit 1

      - name: Wait for cloud-init bootstrap completion
        run: |
          ssh -o ServerAliveInterval=60 -o StrictHostKeyChecking=no -i ~/.ssh/ec2_deploy_key ubuntu@"$PUBLIC_IP" \
            "cloud-init status --wait"

      - name: Deploy/update backend container stack
        env:
          DEPLOY_FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN }}
        run: |
          ssh -o ServerAliveInterval=60 -o StrictHostKeyChecking=no -i ~/.ssh/ec2_deploy_key ubuntu@"$PUBLIC_IP" \
            "DEPLOY_FRONTEND_ORIGIN=${DEPLOY_FRONTEND_ORIGIN}" <<'EOF_DEPLOY'
            set -eu
            REPO_DIR="/home/ubuntu/cs698-repo"
            cd "$REPO_DIR"
            
            echo "Syncing server code with origin/main..."
            sudo -u ubuntu git fetch origin main
            sudo -u ubuntu git reset --hard origin/main
            
            echo "Updating environment variables..."
            FRONTEND_ORIGIN_VALUE="${DEPLOY_FRONTEND_ORIGIN:-}"
            NEW_CORS="[\"${FRONTEND_ORIGIN_VALUE}\", \"http://localhost:5000\", \"http://127.0.0.1:5000\", \"http://localhost:8080\"]"
            if grep -q "CORS_ORIGINS=" "$REPO_DIR/apps/backend/.env"; then
              sudo sed -i "s|CORS_ORIGINS=.*|CORS_ORIGINS='${NEW_CORS}'|" "$REPO_DIR/apps/backend/.env"
            else
              echo "CORS_ORIGINS='${NEW_CORS}'" | sudo tee -a "$REPO_DIR/apps/backend/.env"
            fi
            
            echo "Cleaning up old Docker resources..."
            sudo docker system prune -af
            
            echo "Pulling latest images..."
            sudo docker compose --env-file "$REPO_DIR/apps/backend/.env" -f infra/production/docker-compose.prod.yml pull
            
            echo "Building and starting containers..."
            sudo docker compose --env-file "$REPO_DIR/apps/backend/.env" -f infra/production/docker-compose.prod.yml build
            sudo docker compose --env-file "$REPO_DIR/apps/backend/.env" -f infra/production/docker-compose.prod.yml up -d
          EOF_DEPLOY

      - name: Post-deploy readiness check
        run: |
          HEALTHCHECK_TARGET="${HEALTHCHECK_URL:-${BACKEND_URL}/health/full}"
          MAX_ATTEMPTS=60
          SLEEP_SECONDS=10

          echo "Using healthcheck URL: ${HEALTHCHECK_TARGET}"
          for attempt in $(seq 1 "${MAX_ATTEMPTS}"); do
            if curl -fsS "${HEALTHCHECK_TARGET}" >/dev/null; then
              echo "Healthcheck succeeded on attempt ${attempt}/${MAX_ATTEMPTS}"
              exit 0
            fi

            echo "Healthcheck failed on attempt ${attempt}/${MAX_ATTEMPTS}. Retrying in ${SLEEP_SECONDS}s..."
            sleep "${SLEEP_SECONDS}"
          done

          echo "Healthcheck failed after ${MAX_ATTEMPTS} attempts. Collecting remote diagnostics..."
          ssh -o ServerAliveInterval=60 -o StrictHostKeyChecking=no -i ~/.ssh/ec2_deploy_key ubuntu@"$PUBLIC_IP" <<'EOF_SSH'
            set +e
            echo "===== docker compose ps ====="
            sudo docker compose -f /home/ubuntu/cs698-repo/infra/production/docker-compose.prod.yml ps
            echo "===== docker compose logs backend (tail=200) ====="
            sudo docker compose -f /home/ubuntu/cs698-repo/infra/production/docker-compose.prod.yml logs backend --tail=200
            echo "===== listening sockets on port 8000 ====="
            sudo ss -ltnp | grep ':8000' || echo "No process is listening on TCP port 8000."
          EOF_SSH
          exit 1

      - name: Show deployment summary
        run: |
          echo "Instance ID: $(terraform output -raw instance_id)"
          echo "Instance Name: $(terraform output -raw instance_name)"
          echo "Public IP: $PUBLIC_IP"
          echo "Backend URL: $BACKEND_URL"
