version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spiritual_qa_dev
    ports:
      - "5432:5432"
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spiritual_qa_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - dev_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - dev_qdrant_data:/qdrant/storage

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # Override service hostnames for Docker networking
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/spiritual_qa_dev
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: spiritual_qa_dev
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: spiritual_docs_dev
      # Allow 100MB uploads
      MAX_REQUEST_BODY_BYTES: 104857600
      MAX_UPLOAD_BYTES: 104857600
      # CORS: allow Flutter web-server (default port 8080)
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8080","http://127.0.0.1:8080","http://0.0.0.0:8080","http://localhost:5000","http://127.0.0.1:5000","http://host.docker.internal:8080","http://host.docker.internal:5000"]'
      # Security
      CSRF_SECRET: dev-environment-secret-key
    ports:
      - "8000:8000"
    command: >
      bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - dev_pdf_storage:/app/data/pdfs
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health/full\")' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dev_postgres_data:
  dev_redis_data:
  dev_qdrant_data:
  dev_pdf_storage:
